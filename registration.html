<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <script src="bootstrap.min.js"></script>
</head>
<body>
    <!--Header/Navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#3b2f2f;">
        <div class="container-fluid">
            <!-- BRAND -->
            <a class="navbar-brand text-white" href="index.html">
                <b>PTSS COFFEE CAMPUS ☕</b><br>
                <small style="font-size:0.8rem; color:#f5f1e6;">Fresh Coffee • Fresh Mind</small>
            </a>
            <!-- TOGGLER -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- MENU -->
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active text-white" href="index.html">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="menu.html">
                            <i class="bi bi-cup-hot"></i> Menu
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="registration.html">
                            <i class="bi bi-pencil-square"></i> Registration
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- FORM -->
    <div class="container mt-4">
        <form>
            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="tel" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Booking Date</label>
                <input type="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Coffee Type</label>
                <select class="form-control" required>
                    <option value="">--Select--</option>
                    <option>ESPRESSO</option>
                    <option>LONG BLACK</option>
                    <option>AMERICANO</option>
                    <option>LATTE</option>
                    <option>CAPPUCCINO</option>
                    <option>FLAT WHITE</option>
                    <option>PICCOLO</option>
                    <option>Mocha</option>
                    <option>THAI ICED COFFEE</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" class="form-control" required>
            </div>
            <button class="btn btn-success" style="background-color: #655151;">Submit</button>
        </form>
    </div>

    <!-- FOOTER -->
    <div class="bg-dark text-white text-center p-3 mt-5">
        PAUH INN POLITEKNIK TUANKU SYED SIRAJUDDIN,PERLIS<br>
        &copy; 2026 PTSS Coffee Campus
    </div>
</body>
</html>
